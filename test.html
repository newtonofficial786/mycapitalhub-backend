<!DOCTYPE html>
<html>
<head>
    <title>Test Backend</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #0f0; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }
        pre { background: #333; padding: 15px; white-space: pre-wrap; max-height: 400px; overflow: auto; }
    </style>
</head>
<body>
    <h2>Backend Test</h2>
    <button onclick="testDebug()">Test Debug</button>
    <button onclick="testRegister()">Register</button>
    <button onclick="testDirectRegister()">Direct Register</button>
    <pre id="r">Click a button...</pre>
    
    <script>
    const API = 'http://localhost:8000';
    
    async function testDebug() {
        const formData = new URLSearchParams();
        formData.append('mobile', '9876543210');
        formData.append('password', 'test1234');
        
        const res = await fetch(API + '/api/debug', {
            method: 'POST',
            body: formData
        });
        const data = await res.json();
        document.getElementById('r').textContent = JSON.stringify(data, null, 2);
    }
    
    async function testRegister() {
        const formData = new URLSearchParams();
        formData.append('mobile', '9876543210');
        formData.append('password', 'test1234');
        formData.append('withdrawal_pin', '1234');
        
        const res = await fetch(API + '/api/auth/register', {
            method: 'POST',
            body: formData
        });
        const data = await res.json();
        if (data.token) localStorage.setItem('token', data.token);
        document.getElementById('r').textContent = JSON.stringify(data, null, 2);
    }
    
    async function testDirectRegister() {
        const res = await fetch(API + '/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({mobile: '9876543210', password: 'test1234', withdrawal_pin: '1234'})
        });
        const data = await res.json();
        document.getElementById('r').textContent = JSON.stringify(data, null, 2);
    }
    </script>
</body>
</html>
