<!DOCTYPE html>
<html>
<head><title>Debug</title></head>
<body>
<button onclick="test()">Test</button>
<pre id="r"></pre>
<script>
async function test() {
    const res = await fetch('http://localhost:8000/debug-input.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({mobile: '1234567890', password: 'test1234'})
    });
    const data = await res.json();
    document.getElementById('r').textContent = JSON.stringify(data, null, 2);
}
</script>
</body>
</html>
