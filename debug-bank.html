<!DOCTYPE html>
<html>
<head>
    <title>Debug Bank</title>
</head>
<body>
<h3>Test Bank API</h3>
<button onclick="testGet()">Test GET</button>
<button onclick="testPost()">Test POST</button>
<pre id="r"></pre>

<script>
const API = 'http://localhost:8000/api';

function log(msg) {
    document.getElementById('r').textContent = msg;
}

async function testGet() {
    try {
        const res = await fetch(API + '/user/bank', {
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token') || ''
            }
        });
        const data = await res.json();
        log('GET: ' + JSON.stringify(data, null, 2));
    } catch(e) {
        log('Error: ' + e.message);
    }
}

async function testPost() {
    try {
        const formData = new URLSearchParams();
        formData.append('account_holder', 'Test User');
        formData.append('bank_name', 'Test Bank');
        formData.append('account_number', '1234567890');
        formData.append('ifsc_code', 'TEST0001');

        const res = await fetch(API + '/user/bank', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token') || ''
            },
            body: formData
        });
        const data = await res.json();
        log('POST: ' + JSON.stringify(data, null, 2));
    } catch(e) {
        log('Error: ' + e.message);
    }
}
</script>
</body>
</html>
